<!doctype html>
<html>
  <head>
    <title>Login | PediaMom</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="authPage" style="display: none">
      <div class="auth-page login-page">
        <h2 data-i18n="login">Login</h2>
        <form id="loginForm">
          <input
            id="email"
            type="email"
            data-i18n-placeholder="enter_email"
            placeholder="Enter email address"
            required
          />
          <div class="pw-input-wrap">
            <input
              id="password"
              type="password"
              data-i18n-placeholder="enter_password"
              placeholder="Enter password"
              required
            />
            <button
              type="button"
              class="pw-eye-btn"
              onclick="togglePwVisibility('password', this)"
            >
              👁
            </button>
          </div>
          <button type="submit" data-i18n="login">Login</button>
        </form>
        <a href="#" id="forgotPasswordLink" data-i18n="forgot_password"
          >Forgot password?</a
        >
        <div id="forgotPasswordSection" style="display: none">
          <input
            id="resetEmail"
            type="email"
            data-i18n-placeholder="enter_your_email"
            placeholder="Enter your email"
          />
          <button id="sendResetBtn" data-i18n="send_reset_email">
            Send Reset Email
          </button>
          <div id="resetMessage"></div>
        </div>
      </div>
    </div>
    <script>
      window.__SUPABASE_URL__ = "https://wgexnndxnfjzxlxncezu.supabase.co";
      window.__SUPABASE_ANON_KEY__ =
        "sb_publishable_E1JW4R0JEpe_V5PmCIGDVw_zMiLXtJT";
      function togglePwVisibility(id, btn) {
        const input = document.getElementById(id);
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        btn.textContent = input.type === "password" ? "👁" : "🙈";
      }
    </script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module">
      import { initI18n } from "../js/i18n.js";
      initI18n();
    </script>
  </body>
</html>
